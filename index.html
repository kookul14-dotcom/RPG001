<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Hex RPG: World & Battle</title>
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">

<link rel="icon" href="data:,">
</head>
<body>

    <div id="scene-title" class="scene active">
        <h1 class="game-title">HEX RPG</h1>
        <div class="click-start">CLICK TO START</div>
        <div class="sub-text">REFACTORED EDITION</div>
        
        <button id="btn-reset-start" style="position:absolute; bottom:20px; right:20px; background:none; border:1px solid #444; color:#666; cursor:pointer;">
            Reset Data
        </button>
    </div>

    <div id="scene-stage-select" class="scene">
        <div id="world-map-container">
            </div>
    </div>

    <div id="scene-sub-menu" class="scene">
        <div class="sub-header">
            <span id="sub-menu-title">MENU</span>
            <div style="display:flex; gap:15px;">
                <span id="sub-menu-gold" style="color:gold;">💰 0</span>
                <button id="btn-sub-close" class="close-btn">BACK</button>
            </div>
        </div>
        <div id="sub-menu-content" class="sub-content sub-menu-content">
            </div>
    </div>

    <div id="scene-battle-prep" class="scene">
        <div class="prep-header">
            <div style="font-family:'Orbitron'; color:gold; font-size:18px;" id="prep-title">STAGE PREP</div>
            <div style="font-size:14px; color:#aaa;">DEPLOYED: <span id="prep-count" style="color:white; font-weight:bold;">0 / 6</span></div>
        </div>

        <div class="prep-container">
            <div class="prep-top-row">
                <div class="prep-panel prep-col-left">
                    <div class="panel-header">DEPLOYED</div>
                    <div id="prep-deployed-list" class="deployed-list"></div>
                </div>

                <div class="prep-panel prep-col-center">
                    <div class="panel-header">BATTLEFIELD MAP</div>
                    <div class="prep-map-wrapper">
                        <div id="prep-minimap" class="minimap-grid-layer"></div>
                    </div>
                </div>

                <div class="prep-panel prep-col-right">
                    <div class="panel-header">ENEMIES</div>
                    <div id="prep-enemy-list" class="enemy-list"></div>
                    <div id="prep-tip" style="padding:10px; font-size:11px; color:#888; border-top:1px solid #333;"></div>
                </div>
            </div>

            <div class="prep-bottom-row prep-panel">
                <div class="panel-header">ROSTER (DRAG TO MAP)</div>
                <div id="prep-roster" class="roster-scroll-area"></div>
            </div>
        </div>

        <div class="prep-footer">
            <button class="prep-btn" onclick="game.closePrep()">BACK</button>
            <button class="prep-btn auto" onclick="game.autoFormParty()">AUTO DEPLOY</button>
            <button class="prep-btn start" onclick="game.confirmBattleStart()">BATTLE START</button>
        </div>
    </div>

    <div id="scene-battle" class="scene">
        <div id="game-frame">
            <div id="sidebar-left" class="panel">
                <div class="panel-header">TURN ORDER</div>
                <div id="turn-list" style="flex:1; overflow-y:auto; padding:5px;"></div>
                
                <div class="panel-header" style="border-top:2px solid #444;">BATTLE LOG</div>
                <div id="log-box">
                    <div id="log-content"></div>
                </div>
            </div>

            <div id="viewport">
                <canvas id="gridCanvas"></canvas>
                <div id="overlay-layer"></div>
                
                <div id="stage-title-overlay">
                    <h1 id="stage-main-title">STAGE 1-1</h1>
                    <div class="stage-line"></div>
                    <h3 id="stage-sub-title">The Beginning</h3>
                </div>
            </div>

            <div id="sidebar-right" class="panel">
                <div class="panel-header">UNIT INFO</div>
                <div id="selected-unit-info" style="padding:10px; color:#ccc; font-size:12px;"></div>
            </div>

            <div id="bottom-panel" class="panel">
                </div>
        </div>

        <div id="floating-controls" class="hud-hidden">
            <div id="float-skill-container" class="float-skill-grid"></div>
            <button id="btn-float-end-turn" class="float-end-btn" title="End Turn">⌛</button>
        </div>
    </div>

    <div id="hero-ui-modal" class="modal">
        <div class="hero-ui-container" style="width: 95%; height: 90%; max-width: 1400px;">
            </div>
    </div>

    <div id="modal-party" class="modal" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.8); align-items: center; justify-content: center;">
        <div class="modal-content"></div>
    </div>

    <div id="battle-result-modal" class="modal">
        <div class="modal-content">
            <h1 id="battle-result-title" style="margin-top:0;">VICTORY</h1>
            <p id="battle-result-desc" style="color:#ccc; margin:20px 0;">Enemy defeated!</p>
            <div class="modal-btns">
                </div>
        </div>
    </div>

    <div id="global-tooltip"></div>

    <script type="module" src="js/data/index.js"></script>
    <script type="module" src="js/hex.js"></script>
    <script type="module" src="js/state.js"></script>
    <script type="module" src="js/render/renderer.js"></script>
    <script type="module" src="js/systems/battle/BattleSystem.js"></script>
    <script type="module" src="js/systems/town/TownSystem.js"></script>
    <script type="module" src="js/systems/town/HeroManager.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
